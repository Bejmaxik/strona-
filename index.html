<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ArchiveReps – katalog produktów</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <header class="header">
        <div class="container header__inner">
            <a href="#" class="header__logo">
                <span class="header__logo-icon">📦</span>
                <span class="header__logo-text">ArchiveReps</span>
            </a>
            <p class="header__subtitle">Katalog sprawdzonych reprodukcji</p>
        </div>
    </header>

    <section class="tools">
        <div class="container tools__inner">
            <div class="tools__search">
                <label for="searchInput" class="visually-hidden">Szukaj produktu</label>
                <input type="text" id="searchInput" class="tools__search-input" placeholder="Szukaj produktu…" />
            </div>
            <div class="tools__filters" id="filterButtons">
                <button class="tools__filter-btn active" data-category="all">Wszystkie</button>
                <button class="tools__filter-btn" data-category="Odzież">Odzież</button>
                <button class="tools__filter-btn" data-category="Obuwie">Obuwie</button>
                <button class="tools__filter-btn" data-category="Akcesoria">Akcesoria</button>
            </div>
            <div class="tools__sort">
                <label for="sortSelect" class="visually-hidden">Sortuj według</label>
                <select id="sortSelect" class="tools__sort-select">
                    <option value="default">Domyślne</option>
                    <option value="price-asc">Cena ↑</option>
                    <option value="price-desc">Cena ↓</option>
                    <option value="name-asc">Nazwa A–Z</option>
                    <option value="name-desc">Nazwa Z–A</option>
                </select>
            </div>
        </div>
    </section>

    <main class="main">
        <div class="container">
            <div class="products-grid" id="productsGrid"></div>
            <div class="products-empty" id="emptyMessage" hidden>
                <p>😕 Brak produktów spełniających kryteria.</p>
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="modalOverlay" hidden>
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
            <button class="modal__close" id="modalClose" aria-label="Zamknij">&times;</button>
            <div class="modal__content">
                <img class="modal__image" id="modalImage" src="" alt="" />
                <div class="modal__body">
                    <h2 class="modal__title" id="modalTitle">Nazwa produktu</h2>
                    <span class="modal__category" id="modalCategory">Kategoria</span>
                    <p class="modal__description" id="modalDescription">Opis produktu.</p>
                    <div class="modal__price" id="modalPrice">0,00 zł</div>
                    <a class="modal__link" id="modalLink" href="#" target="_blank" rel="noopener">
                        🔗 Zobacz oryginał
                    </a>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container footer__inner">
            <p>&copy; 2025 ArchiveReps &mdash; Katalog produktów &mdash; Wszelkie prawa zastrzeżone.</p>
        </div>
    </footer>

    <!-- JEDEN plik JS – dane + logika -->
    <script src="script.js"></script>
</body>
</html>
